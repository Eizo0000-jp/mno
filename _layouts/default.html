<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | 楽天モバイルで節約生活</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ETZGTWCXDQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ETZGTWCXDQ');
  </script>
  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  {% feed_meta %}
  {% seo %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #7f0019;
      --text:       #3c3c43;
      --text-sub:   #6d6d72;
      --text-light: #9d9da0;
      --bg:         #fff;
      --bg-kinari:  #f4eede;
      --bg-beige:   #e0ceaa;
      --bg-gray:    #f5f5f5;
      --border:     #d8d8d9;
      --border-lt:  #ebebec;
    }

    body {
      font-family: "Helvetica Neue", Arial, "Noto Sans JP", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      word-break: break-all;
      overflow-wrap: break-word;
    }

    a { color: var(--red); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .site-logo {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }
    .site-logo:hover { text-decoration: none; }
    .site-nav { display: flex; gap: 32px; }
    .site-nav a { font-size: 14px; font-weight: 700; color: var(--text-sub); }

    .site-main { max-width: 1120px; margin: 0 auto; padding: 64px 32px 96px; }

    .site-footer {
      border-top: 1px solid var(--border);
      padding: 40px 32px;
      text-align: center;
    }
    .site-footer p { font-size: 12px; color: var(--text-light); line-height: 1.6; }
    .site-footer a { color: var(--text-sub); }

    .cta-banner {
      background: var(--bg-kinari);
      padding: 40px 32px;
      text-align: center;
      margin: 64px 0;
    }
    .cta-banner p {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 24px;
    }
    .cta-banner a {
      display: inline-block;
      background: var(--red);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 12px 32px;
      border-radius: 4px;
      text-decoration: none;
    }
    .cta-banner a:hover { opacity: 0.8; text-decoration: none; }

    @media (max-width: 767px) {
      .site-header { padding: 0 16px; }
      .site-main { padding: 40px 16px 64px; }
      .site-footer { padding: 32px 16px; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-logo">楽天モバイルで節約生活</a>
  <nav class="site-nav">
    <a href="/">トップ</a>
    <a href="/blog/">ブログ</a>
  </nav>
</header>

<main class="site-main">
  {{ content }}
</main>

<footer class="site-footer">
  <p>このサイトは楽天社員による個人的な紹介サイトです。</p>
  <p>掲載情報は作成時点のものです。最新情報は<a href="https://network.mobile.rakuten.co.jp/" target="_blank" rel="noopener">楽天モバイル公式サイト</a>をご確認ください。</p>
</footer>

</body>
</html>
