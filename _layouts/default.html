<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | 楽天モバイルで節約生活</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ja_JP">
  <link rel="canonical" href="{{ page.url | prepend: site.url }}">
  {% feed_meta %}
  {% seo %}
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #cc0000; --red-light: #ff4444; --bg: #fff8f8; --gray: #666; --border: #e8d0d0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; color: #1a1a1a; background: #fff; line-height: 1.8; }
    a { color: var(--red); }

    /* HEADER */
    .site-header {
      background: var(--red);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .site-header a { text-decoration: none; }
    .site-title { color: #fff; font-weight: 900; font-size: 1.05rem; }
    .site-nav { display: flex; gap: 20px; }
    .site-nav a { color: rgba(255,255,255,0.85); font-size: 0.9rem; text-decoration: none; }
    .site-nav a:hover { color: #fff; }

    /* MAIN */
    .site-main { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }

    /* FOOTER */
    .site-footer { background: #1a1a1a; color: #999; padding: 30px 20px; text-align: center; font-size: 0.8rem; line-height: 2; }
    .site-footer a { color: #ccc; }

    /* CTA BANNER */
    .cta-banner {
      background: linear-gradient(135deg, var(--red), var(--red-light));
      color: #fff;
      border-radius: 14px;
      padding: 28px 24px;
      text-align: center;
      margin: 48px 0;
    }
    .cta-banner p { font-size: 1rem; margin-bottom: 16px; opacity: 0.95; }
    .cta-banner a {
      display: inline-block;
      background: #fff;
      color: var(--red);
      font-weight: 900;
      padding: 14px 36px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-title">楽天モバイルで節約生活</a>
  <nav class="site-nav">
    <a href="/">トップ（LP）</a>
    <a href="/blog/">ブログ</a>
  </nav>
</header>

<main class="site-main">
  {{ content }}
</main>

<footer class="site-footer">
  <p>このサイトは楽天社員による個人的な紹介サイトです。</p>
  <p>掲載情報は作成時点のものです。最新情報は<a href="https://network.mobile.rakuten.co.jp/" target="_blank" rel="noopener">楽天モバイル公式サイト</a>をご確認ください。</p>
</footer>

</body>
</html>
