---
layout: default
---
<style>
  .post-header { margin-bottom: 32px; border-bottom: 3px solid #cc0000; padding-bottom: 20px; }
  .post-title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 900; line-height: 1.4; margin-bottom: 10px; }
  .post-meta { color: #888; font-size: 0.85rem; }
  .post-body h2 { font-size: 1.4rem; font-weight: 900; color: #cc0000; margin: 36px 0 14px; padding-left: 12px; border-left: 4px solid #cc0000; }
  .post-body h3 { font-size: 1.1rem; font-weight: bold; margin: 24px 0 10px; }
  .post-body p { margin-bottom: 18px; }
  .post-body ul, .post-body ol { margin: 0 0 18px 24px; }
  .post-body li { margin-bottom: 6px; }
  .post-body strong { color: #cc0000; }
  .post-nav { display: flex; justify-content: space-between; margin-top: 48px; gap: 16px; flex-wrap: wrap; }
  .post-nav a { color: #cc0000; font-size: 0.9rem; text-decoration: none; }
</style>

<article>
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%Y年%-m月%-d日" }}</p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <div class="cta-banner">
    <p>この記事を読んで楽天モバイルに興味を持ったら、ぜひ社員紹介リンクからお申し込みください。</p>
    <a href="https://r10.to/henTIE" target="_blank" rel="noopener">今すぐ無料で申し込む →</a>
  </div>

  <nav class="post-nav">
    {% if page.previous.url %}
      <a href="{{ page.previous.url }}">← {{ page.previous.title }}</a>
    {% else %}
      <span></span>
    {% endif %}
    {% if page.next.url %}
      <a href="{{ page.next.url }}">{{ page.next.title }} →</a>
    {% endif %}
  </nav>
</article>
