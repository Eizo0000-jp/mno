---
layout: default
---
<style>
  .post-header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
    margin-bottom: 48px;
  }
  .post-eyebrow {
    font-size: 12px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 2.4px;
    line-height: 1.15;
    margin-bottom: 16px;
  }
  .post-title {
    font-size: clamp(26px, 4vw, 32px);
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 12px;
  }
  .post-meta { font-size: 12px; color: var(--text-light); }

  .post-body { max-width: 720px; }
  .post-body h2 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
    margin: 48px 0 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-lt);
  }
  .post-body h3 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2.4px;
    line-height: 1.15;
    color: var(--text);
    margin: 32px 0 12px;
  }
  .post-body p { font-size: 16px; margin-bottom: 20px; color: var(--text); }
  .post-body ul, .post-body ol { margin: 0 0 20px 20px; }
  .post-body li { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .post-body strong { color: var(--red); font-weight: 700; }

  .post-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    gap: 16px;
    flex-wrap: wrap;
  }
  .post-nav a { font-size: 12px; color: var(--text-sub); }
</style>

<article>
  <header class="post-header">
    <p class="post-eyebrow">BLOG</p>
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%Y年%-m月%-d日" }}</p>
  </header>

  <div class="post-body">
    {{ content }}
  </div>

  <div class="cta-banner">
    <p>この記事を読んで楽天モバイルに興味を持ったら、社員紹介リンクからお申し込みください。</p>
    <a href="https://r10.to/henTIE" target="_blank" rel="noopener">今すぐ無料で申し込む</a>
  </div>

  <nav class="post-nav">
    {% if page.previous.url %}
      <a href="{{ page.previous.url }}">← {{ page.previous.title }}</a>
    {% else %}
      <span></span>
    {% endif %}
    {% if page.next.url %}
      <a href="{{ page.next.url }}">{{ page.next.title }} →</a>
    {% endif %}
  </nav>
</article>
