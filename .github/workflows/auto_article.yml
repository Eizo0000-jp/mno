name: SEO記事 自動生成・公開

on:
  schedule:
    # 毎日 JST 10:00（UTC 01:00）
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      post_date:
        description: "記事の日付 (YYYY-MM-DD)。空欄なら今日"
        required: false
        default: ""

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存関係インストール
        run: pip install -r automation/requirements.txt

      - name: 記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.post_date }}" ]; then
            DATE_ARG="--date=${{ github.event.inputs.post_date }}"
          fi
          python automation/generate_article.py $DATE_ARG

      - name: Threads投稿CSVを生成
        run: python automation/generate_threads_csv.py

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/ assets/posts.csv
          git diff --staged --quiet || git commit -m "auto: SEO記事＋Threads投稿CSV追加 $(date +'%Y-%m-%d')"
          git push
