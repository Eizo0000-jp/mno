name: SEO記事 自動生成・公開

on:
  schedule:
    # 毎週月・木 JST 10:00（UTC 01:00）
    - cron: "0 1 * * 1"
    - cron: "0 1 * * 4"
  workflow_dispatch:   # 手動実行も可能

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存関係インストール
        run: pip install -r automation/requirements.txt

      - name: 記事を生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python automation/generate_article.py

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --staged --quiet || git commit -m "auto: SEO記事を追加 $(date +'%Y-%m-%d')"
          git push
