name: 多言語LP生成

on:
  workflow_dispatch:  # 手動実行のみ

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 依存関係インストール
        run: pip install -r automation/requirements.txt

      - name: 多言語LP生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python automation/generate_lp_translations.py

      - name: コミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add en/ ko/ zh-cn/ zh-tw/ tl/ vi/
          git diff --staged --quiet || git commit -m "feat: 多言語LP生成 $(date +'%Y-%m-%d')"
          git push
